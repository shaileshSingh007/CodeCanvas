<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fractal Journey</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #05050a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            touch-action: none;
            overflow: hidden;
            color: white;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 4/6;
            background: #000;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0, 200, 255, 0.1), 0 0 0 2px rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 20px;
        }

        /* UI Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(5, 5, 15, 0.85);
            backdrop-filter: blur(8px);
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.5));
        }

        h2 {
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        p {
            font-size: 1rem;
            color: #a0aab5;
            margin-bottom: 2rem;
            text-align: center;
            max-width: 80%;
            line-height: 1.5;
        }

        .btn {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            border: none;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.3);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 5px 10px rgba(0, 242, 254, 0.3);
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 5;
            pointer-events: none;
        }

        .hud-panel {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            backdrop-filter: blur(4px);
        }

        .hud-text {
            font-size: 0.8rem;
            color: #8899a6;
            letter-spacing: 1px;
        }

        .hud-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
        }

        #lives-container {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }

        .life {
            width: 12px;
            height: 12px;
            background: #00f2fe;
            border-radius: 50%;
            box-shadow: 0 0 8px #00f2fe;
            transition: all 0.3s;
        }

        .life.lost {
            background: #333;
            box-shadow: none;
        }

        /* Progress Bar */
        #progress-container {
            position: absolute;
            bottom: 20px;
            left: 10%;
            width: 80%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            z-index: 5;
            overflow: hidden;
            pointer-events: none;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            box-shadow: 0 0 10px #00f2fe;
            transition: width 0.1s linear;
        }

        /* Hit Flash */
        #flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 50, 0.4);
            z-index: 8;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s;
        }

        .flash-active {
            opacity: 1 !important;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    
    <div id="flash"></div>

    <div id="hud" class="hidden">
        <div class="hud-panel">
            <span class="hud-text">LEVEL <span id="level-display" class="hud-value">1</span></span>
            <span class="hud-text">SCORE <span id="score-display" class="hud-value">0</span></span>
        </div>
        <div class="hud-panel" style="align-items: flex-end;">
            <span class="hud-text">SHIELDS</span>
            <div id="lives-container">
                <div class="life"></div>
                <div class="life"></div>
                <div class="life"></div>
            </div>
        </div>
    </div>

    <div id="progress-container" class="hidden">
        <div id="progress-bar"></div>
    </div>

    <!-- Main Menu -->
    <div id="menu-screen" class="overlay">
        <h1>Fractal<br>Journey</h1>
        <p>Drag to move your core. Avoid the red anomalies. Survive to reach deeper dimensions.</p>
        <button class="btn" id="start-btn">Initiate</button>
    </div>

    <!-- Level Complete -->
    <div id="level-screen" class="overlay hidden">
        <h2>Sector Cleared</h2>
        <p>Anomaly density increasing. Shield regeneration failed.</p>
        <button class="btn" id="next-level-btn">Descend Deeper</button>
    </div>

    <!-- Game Over -->
    <div id="game-over-screen" class="overlay hidden">
        <h1 style="color: #ff3366; filter: drop-shadow(0 0 10px rgba(255,51,102,0.5)); background: none; -webkit-text-fill-color: #ff3366;">Core Destroyed</h1>
        <p>Final Score: <span id="final-score" style="color:white; font-size: 1.5rem; font-weight:bold;">0</span></p>
        <button class="btn" id="restart-btn">Restart Matrix</button>
    </div>

    <!-- Victory -->
    <div id="victory-screen" class="overlay hidden">
        <h1>Ascension</h1>
        <p>You have survived the fractal depths.</p>
        <p>Final Score: <span id="victory-score" style="color:white; font-size: 1.5rem; font-weight:bold;">0</span></p>
        <button class="btn" id="home-btn">Return Home</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;

    // UI Elements
    const screens = {
        menu: document.getElementById('menu-screen'),
        level: document.getElementById('level-screen'),
        gameOver: document.getElementById('game-over-screen'),
        victory: document.getElementById('victory-screen'),
        hud: document.getElementById('hud'),
        progress: document.getElementById('progress-container')
    };
    const uiDisplays = {
        score: document.getElementById('score-display'),
        level: document.getElementById('level-display'),
        lives: document.querySelectorAll('.life'),
        progress: document.getElementById('progress-bar'),
        flash: document.getElementById('flash'),
        finalScore: document.getElementById('final-score'),
        victoryScore: document.getElementById('victory-score')
    };

    // Level Definitions
    const LEVELS = [
        { id: 1, duration: 20, spawnRate: 0.03, enemySpeedBase: 1.2, colorOffset: 0 },
        { id: 2, duration: 25, spawnRate: 0.05, enemySpeedBase: 1.8, colorOffset: 1.5 },
        { id: 3, duration: 30, spawnRate: 0.07, enemySpeedBase: 2.2, colorOffset: 3.14 },
        { id: 4, duration: 35, spawnRate: 0.09, enemySpeedBase: 2.8, colorOffset: 4.5 },
        { id: 5, duration: 40, spawnRate: 0.12, enemySpeedBase: 3.5, colorOffset: 6.0 }
    ];

    // Game State
    let state = 'MENU'; // MENU, PLAYING, TRANSITION, GAMEOVER, VICTORY
    let currentLevelIdx = 0;
    let score = 0;
    let lives = 3;
    let timeInLevel = 0;
    let depth = 0; // Visual zoom factor
    let lastTime = 0;

    // Entities
    const player = { x: W/2, y: H/2, size: 8, invincibilityTimer: 0 };
    let enemies = [];
    let particles = [];

    // --- Core Functions ---

    function setScreen(screenName) {
        Object.values(screens).forEach(s => s.classList.add('hidden'));
        if (screenName === 'PLAYING') {
            screens.hud.classList.remove('hidden');
            screens.progress.classList.remove('hidden');
        } else {
            if(screens[screenName]) screens[screenName].classList.remove('hidden');
        }
        state = screenName;
    }

    function updateHUD() {
        uiDisplays.score.textContent = Math.floor(score);
        uiDisplays.level.textContent = LEVELS[currentLevelIdx].id;
        
        uiDisplays.lives.forEach((lifeEl, idx) => {
            if (idx < lives) lifeEl.classList.remove('lost');
            else lifeEl.classList.add('lost');
        });

        const levelData = LEVELS[currentLevelIdx];
        const progressPct = Math.min(100, (timeInLevel / levelData.duration) * 100);
        uiDisplays.progress.style.width = `${progressPct}%`;
    }

    function initLevel() {
        player.x = W/2;
        player.y = H/2;
        player.invincibilityTimer = 2; // 2 seconds invincibility at start
        enemies = [];
        particles = [];
        timeInLevel = 0;
        lastTime = performance.now();
        setScreen('PLAYING');
        updateHUD();
        requestAnimationFrame(gameLoop);
    }

    function takeDamage() {
        if (player.invincibilityTimer > 0) return;
        
        lives--;
        player.invincibilityTimer = 2.0; // 2 sec i-frames
        
        // Screen flash
        uiDisplays.flash.classList.add('flash-active');
        setTimeout(() => uiDisplays.flash.classList.remove('flash-active'), 100);

        // Explosion particles
        createExplosion(player.x, player.y, '#00f2fe');

        updateHUD();

        if (lives <= 0) {
            uiDisplays.finalScore.textContent = Math.floor(score);
            setScreen('gameOver');
        }
    }

    function createExplosion(x, y, color) {
        for (let i = 0; i < 20; i++) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                life: 1.0,
                color: color
            });
        }
    }

    // --- Entity Spawning & Logic ---

    function spawnEnemy(levelData) {
        const side = Math.floor(Math.random() * 4);
        const margin = 40;
        let x, y;
        
        if (side === 0) { x = Math.random() * W; y = -margin; }
        else if (side === 1) { x = Math.random() * W; y = H + margin; }
        else if (side === 2) { x = -margin; y = Math.random() * H; }
        else { x = W + margin; y = Math.random() * H; }

        enemies.push({
            x, y,
            size: 10 + Math.random() * 8,
            speed: levelData.enemySpeedBase * (0.8 + Math.random() * 0.4),
            wobbleSpeed: Math.random() * 0.1,
            wobblePhase: Math.random() * Math.PI * 2
        });
    }

    function updateEntities(dt) {
        const levelData = LEVELS[currentLevelIdx];
        
        // Player invincibility
        if (player.invincibilityTimer > 0) {
            player.invincibilityTimer -= dt;
        }

        // Spawn Enemies
        if (Math.random() < levelData.spawnRate * (dt * 60)) {
            spawnEnemy(levelData);
        }

        // Update Enemies
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            
            // Move towards center (creates a zooming past effect)
            const dx = W/2 - e.x;
            const dy = H/2 - e.y;
            const distToCenter = Math.hypot(dx, dy);
            
            let vx = 0, vy = 0;
            if (distToCenter > 1) {
                // Combine movement towards center with some homing towards player
                const pdx = player.x - e.x;
                const pdy = player.y - e.y;
                const pDist = Math.hypot(pdx, pdy);
                
                const blend = 0.3; // How much they track player vs center
                const dirX = (dx/distToCenter) * (1-blend) + (pdx/pDist) * blend;
                const dirY = (dy/distToCenter) * (1-blend) + (pdy/pDist) * blend;

                // Add wobble
                const perpX = -dirY;
                const perpY = dirX;
                const wobble = Math.sin(depth * e.wobbleSpeed + e.wobblePhase) * 2;

                vx = dirX * e.speed + perpX * wobble;
                vy = dirY * e.speed + perpY * wobble;
            }

            e.x += vx * (dt * 60);
            e.y += vy * (dt * 60);

            // Collision with player
            const pDx = player.x - e.x;
            const pDy = player.y - e.y;
            if (Math.hypot(pDx, pDy) < player.size + e.size * 0.6) {
                takeDamage();
                createExplosion(e.x, e.y, '#ff3366');
                enemies.splice(i, 1);
                continue;
            }

            // Remove if way off screen
            if (e.x < -100 || e.x > W + 100 || e.y < -100 || e.y > H + 100 || distToCenter < 5) {
                enemies.splice(i, 1);
            }
        }

        // Update Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx * (dt * 60);
            p.y += p.vy * (dt * 60);
            p.life -= dt * 2;
            if (p.life <= 0) particles.splice(i, 1);
        }
    }

    // --- Rendering ---

    function getFractalColor(t, colorOffset) {
        // Generates dynamic background colors based on level
        const r = 30 + 100 * (1 - t) * (0.8 + 0.2 * Math.sin(colorOffset));
        const g = 10 + 60 * t * (0.6 + 0.4 * Math.cos(colorOffset * 1.5));
        const b = 80 + 80 * (1 - t * 0.5) * (0.7 + 0.3 * Math.sin(colorOffset * 2));
        return `rgb(${r|0}, ${g|0}, ${b|0})`;
    }

    function drawBackground(levelData) {
        // Base gradient
        const grad = ctx.createRadialGradient(W/2, H/2, 10, W/2, H/2, 350);
        grad.addColorStop(0, '#0a0a1a');
        grad.addColorStop(1, '#020205');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Draw zooming fractal rings
        const rings = 12;
        for (let i = 0; i < rings; i++) {
            const t = (i + (depth % 1)) / rings; // 0 to 1
            const radius = 20 + Math.pow(t, 2) * 400; // Exponential zoom out
            const alpha = 1 - Math.pow(t, 3); // Fade out as they get big

            ctx.beginPath();
            ctx.arc(W/2, H/2, radius, 0, Math.PI * 2);
            ctx.lineWidth = 1 + t * 4;
            ctx.strokeStyle = `rgba(100, 150, 255, ${alpha * 0.2})`;
            ctx.stroke();

            // Draw nodes on rings
            const nodes = 6 + i * 2;
            for(let j=0; j<nodes; j++) {
                const angle = (j / nodes) * Math.PI * 2 + depth * 0.5 * (i%2==0?1:-1);
                const nx = W/2 + Math.cos(angle) * radius;
                const ny = H/2 + Math.sin(angle) * radius;
                
                ctx.beginPath();
                ctx.arc(nx, ny, 2 + t * 5, 0, Math.PI * 2);
                ctx.fillStyle = getFractalColor(t, levelData.colorOffset);
                ctx.fill();
            }
        }
    }

    function render() {
        const levelData = LEVELS[currentLevelIdx];
        ctx.clearRect(0, 0, W, H);
        
        drawBackground(levelData);

        // Draw Enemies
        for (const e of enemies) {
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
            ctx.fillStyle = '#ff2255';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff0033';
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Inner core
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.size * 0.4, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
        }

        // Draw Player
        ctx.save();
        ctx.translate(player.x, player.y);
        
        // Invincibility blink
        if (player.invincibilityTimer <= 0 || Math.floor(player.invincibilityTimer * 10) % 2 === 0) {
            // Aura
            ctx.beginPath();
            ctx.arc(0, 0, player.size * 1.8, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 242, 254, 0.3)';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00f2fe';
            ctx.fill();

            // Core
            ctx.beginPath();
            ctx.arc(0, 0, player.size, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // Draw Shield Ring if invincible
        if (player.invincibilityTimer > 0) {
            ctx.beginPath();
            ctx.arc(0, 0, player.size * 2.5, 0, Math.PI * 2);
            ctx.lineWidth = 2;
            ctx.strokeStyle = `rgba(0, 242, 254, ${player.invincibilityTimer})`;
            ctx.stroke();
        }
        ctx.restore();

        // Draw Particles
        for (const p of particles) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.life * 3, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.fill();
            ctx.globalAlpha = 1.0;
        }
    }

    // --- Main Loop ---

    function gameLoop(timestamp) {
        if (state !== 'PLAYING') return;

        const dt = (timestamp - lastTime) / 1000;
        lastTime = timestamp;

        // Cap dt to prevent massive jumps if tab is backgrounded
        if (dt > 0.1) {
            requestAnimationFrame(gameLoop);
            return;
        }

        timeInLevel += dt;
        depth += dt * 0.5; // Controls background animation speed
        score += dt * 10 * (currentLevelIdx + 1);

        const levelData = LEVELS[currentLevelIdx];

        updateEntities(dt);
        render();
        updateHUD();

        // Check Level Complete
        if (timeInLevel >= levelData.duration) {
            if (currentLevelIdx < LEVELS.length - 1) {
                setScreen('level');
            } else {
                uiDisplays.victoryScore.textContent = Math.floor(score);
                setScreen('victory');
            }
            return; // pause loop
        }

        requestAnimationFrame(gameLoop);
    }

    // --- Input Handling ---

    function movePlayerTo(x, y) {
        if (state === 'PLAYING') {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            player.x = Math.min(W - player.size, Math.max(player.size, (x - rect.left) * scaleX));
            player.y = Math.min(H - player.size, Math.max(player.size, (y - rect.top) * scaleY));
        }
    }

    // Touch Support
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        movePlayerTo(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });
    
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        movePlayerTo(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });

    // Mouse Support
    let isMouseDown = false;
    canvas.addEventListener('mousedown', (e) => {
        isMouseDown = true;
        movePlayerTo(e.clientX, e.clientY);
    });
    canvas.addEventListener('mousemove', (e) => {
        if(isMouseDown) movePlayerTo(e.clientX, e.clientY);
    });
    window.addEventListener('mouseup', () => isMouseDown = false);

    // Keyboard Support
    const keys = {};
    window.addEventListener('keydown', (e) => keys[e.key] = true);
    window.addEventListener('keyup', (e) => keys[e.key] = false);
    
    setInterval(() => {
        if (state !== 'PLAYING') return;
        const speed = 7;
        if (keys['ArrowUp'] || keys['w']) player.y = Math.max(player.size, player.y - speed);
        if (keys['ArrowDown'] || keys['s']) player.y = Math.min(H - player.size, player.y + speed);
        if (keys['ArrowLeft'] || keys['a']) player.x = Math.max(player.size, player.x - speed);
        if (keys['ArrowRight'] || keys['d']) player.x = Math.min(W - player.size, player.x + speed);
    }, 16);

    // --- Button Listeners ---

    document.getElementById('start-btn').addEventListener('click', () => {
        currentLevelIdx = 0;
        score = 0;
        lives = 3;
        initLevel();
    });

    document.getElementById('next-level-btn').addEventListener('click', () => {
        currentLevelIdx++;
        initLevel();
    });

    document.getElementById('restart-btn').addEventListener('click', () => {
        currentLevelIdx = 0;
        score = 0;
        lives = 3;
        initLevel();
    });

    document.getElementById('home-btn').addEventListener('click', () => {
        setScreen('menu');
    });

    // Initial load
    drawBackground(LEVELS[0]); // Draw a static background for the menu
</script>

</body>
</html>
