<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Match · Flip</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      min-height: 100vh;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Fredoka', system-ui, sans-serif;
      padding: 10px;
      margin: 0;
      overflow: hidden;
    }

    .game-container {
      background: #d9c8a8;
      background-image: linear-gradient(160deg, #efdbc1, #c8af7e);
      border-radius: 40px;
      padding: 0.9rem 1.2rem 1rem;
      box-shadow: 0 18px 30px rgba(0,0,0,0.7), inset 0 1px 6px #fff9e6;
      border: 3px solid #aa8b5c;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 550px;
      width: fit-content;
      margin: auto;
    }

    .compact-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #3b2b10;
      text-shadow: 1px 1px 0 #e7c288;
      background: #faf3dd;
      padding: 0.2rem 1.8rem;
      border-radius: 3rem;
      box-shadow: 0 4px 0 #a4854a;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      letter-spacing: 1px;
      line-height: 1.2;
    }

    .stats-panel {
      display: flex;
      gap: 1rem;
      align-items: center;
      background: #3d301a;
      border-radius: 2rem;
      padding: 0.4rem 1.4rem;
      margin-bottom: 0.6rem;
      color: #fbeab6;
      font-weight: bold;
      font-size: 1.1rem;
      box-shadow: inset 0 -3px 0 #1e1505, 0 6px 10px rgba(0,0,0,0.4);
      border: 2px solid #c9a85b;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      background: #fff2cc;
      color: #3d2e0e;
      padding: 0.1rem 1rem;
      border-radius: 2rem;
      font-size: 1.1rem;
    }

    #movesDisplay, #pairsDisplay {
      background: #1b2a10;
      color: #fae350;
      padding: 0.1rem 0.9rem;
      border-radius: 2rem;
      min-width: 45px;
      text-align: center;
      font-weight: 700;
      box-shadow: 0 0 8px #ffd966;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.7rem;
      background: #5b7240;
      padding: 1rem;
      border-radius: 50px;
      background: #698a45;
      background-image: linear-gradient(180deg, #7c9a4e, #435e26);
      box-shadow: inset 0 8px 12px rgba(0,0,0,0.5), 0 12px 16px rgba(0,0,0,0.5);
      border: 3px solid #876f40;
      margin: 0.3rem 0 0.7rem;
    }

    .card {
      width: 80px;
      height: 95px;
      background: transparent;
      perspective: 700px;
      cursor: pointer;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.35s cubic-bezier(0.18, 0.89, 0.32, 1.1);
      transform-style: preserve-3d;
      border-radius: 14px;
      box-shadow: 0 7px 8px rgba(0,0,0,0.45);
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      box-shadow: inset 0 -3px 0 rgba(0,0,0,0.25);
      border: 2px solid rgba(255,250,200,0.8);
    }

    .card-front {
      background: radial-gradient(circle at 30% 30%, #fde16d, #d18c1f);
      background-image: linear-gradient(135deg, #fedb58, #d68513);
      color: #442d04;
      transform: rotateY(180deg);
      text-shadow: 1px 1px 0 white;
    }

    .card-back {
      background: #4d3e24;
      background-image: repeating-linear-gradient(45deg, #7a6844 0px, #7a6844 3px, #8f7650 3px, #8f7650 7px);
      color: #f7e9c0;
      font-size: 2.2rem;
      text-shadow: 2px 2px 0 #2f2009;
      border: 2px solid #dbbf7a;
    }

    .card.matched .card-front {
      background: radial-gradient(circle at 30% 30%, #b5d882, #4d7530);
      filter: drop-shadow(0 0 10px #d6ff9b);
      border-color: #eaffc9;
    }

    .controls {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      margin-top: 0.2rem;
    }

    button {
      background: #fcba3f;
      background: radial-gradient(circle at 30% 30%, #ffe28c, #e89422);
      border: none;
      color: #352a0a;
      font-weight: bold;
      font-size: 1.2rem;
      padding: 0.4rem 1.5rem;
      border-radius: 2.5rem;
      cursor: pointer;
      box-shadow: 0 5px 0 #ac6b28, 0 7px 10px rgba(0,0,0,0.35);
      border: 2px solid #ffe8a3;
      transition: all 0.07s linear;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #ac6b28, 0 5px 8px rgba(0,0,0,0.35);
    }

    #messageBox {
      min-height: 2rem;
      font-weight: bold;
      color: #fcf9c9;
      background: #2e471e;
      padding: 0.2rem 1.5rem;
      border-radius: 2rem;
      margin: 0.4rem 0 0;
      font-size: 1rem;
      letter-spacing: 0.3px;
      text-align: center;
    }

    @media (max-width: 500px) {
      .card {
        width: 68px;
        height: 82px;
      }
      .grid {
        gap: 0.5rem;
        padding: 0.8rem;
      }
      h1 {
        font-size: 1.7rem;
        padding: 0.1rem 1.3rem;
      }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="compact-header">
    <h1>
      <span>🧠</span>MATCH<span>🃏</span>
    </h1>
  </div>

  <div class="stats-panel">
    <span class="stat">👣<span id="movesDisplay">0</span></span>
    <span class="stat">💖<span id="pairsDisplay">0</span>/8</span>
  </div>

  <div class="grid" id="cardGrid"></div>

  <div class="controls">
    <button id="newGameBtn">
      <span>🔄</span> NEW
    </button>
  </div>

  <div id="messageBox">
    ✨ Match pairs!
  </div>
</div>

<script>
  (function() {
    const EMOJIS = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
    const TOTAL_PAIRS = EMOJIS.length;
    
    let cards = [];
    let moves = 0;
    let matchedPairs = 0;
    let lockBoard = false;
    let firstCard = null;
    let secondCard = null;
    
    const gridEl = document.getElementById('cardGrid');
    const movesDisplay = document.getElementById('movesDisplay');
    const pairsDisplay = document.getElementById('pairsDisplay');
    const messageBox = document.getElementById('messageBox');
    const newGameBtn = document.getElementById('newGameBtn');
    
    function updateStats() {
      movesDisplay.textContent = moves;
      pairsDisplay.textContent = `${matchedPairs}/${TOTAL_PAIRS}`;
    }
    
    function setMessage(text, isGood = true) {
      messageBox.innerHTML = text;
      messageBox.style.color = isGood ? '#fcf9c9' : '#ffc2c2';
    }
    
    function checkWin() {
      if (matchedPairs === TOTAL_PAIRS) {
        setMessage('🎉 YOU WIN! 🎉', true);
        lockBoard = true;
      }
    }
    
    function resetBoardState() {
      [firstCard, secondCard] = [null, null];
      lockBoard = false;
    }
    
    function unflipCards(card1, card2) {
      lockBoard = true;
      setTimeout(() => {
        if (card1 && !card1.matched) {
          card1.flipped = false;
          card1.element.classList.remove('flipped');
        }
        if (card2 && !card2.matched) {
          card2.flipped = false;
          card2.element.classList.remove('flipped');
        }
        resetBoardState();
      }, 750);
    }
    
    function handleCardClick(card) {
      return function() {
        if (lockBoard) return;
        if (card.matched) return;
        if (card.flipped) return;
        if (matchedPairs === TOTAL_PAIRS) return;
        
        card.flipped = true;
        card.element.classList.add('flipped');
        
        if (firstCard === null) {
          firstCard = card;
          return;
        }
        
        secondCard = card;
        moves++;
        updateStats();
        
        if (firstCard.emoji === secondCard.emoji) {
          firstCard.matched = true;
          secondCard.matched = true;
          matchedPairs++;
          firstCard.element.classList.add('matched');
          secondCard.element.classList.add('matched');
          updateStats();
          setMessage('✅ Match!', true);
          resetBoardState();
          checkWin();
        } else {
          setMessage('❌ Nope...', false);
          unflipCards(firstCard, secondCard);
        }
      };
    }
    
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    
    function buildGrid() {
      gridEl.innerHTML = '';
      cards = [];
      
      let deck = [];
      EMOJIS.forEach(emoji => {
        deck.push({ emoji, matched: false, flipped: false });
        deck.push({ emoji, matched: false, flipped: false });
      });
      
      deck = shuffleArray(deck);
      
      deck.forEach((cardData, index) => {
        const cardDiv = document.createElement('div');
        cardDiv.className = 'card';
        
        const innerDiv = document.createElement('div');
        innerDiv.className = 'card-inner';
        
        const frontDiv = document.createElement('div');
        frontDiv.className = 'card-front';
        frontDiv.textContent = cardData.emoji;
        
        const backDiv = document.createElement('div');
        backDiv.className = 'card-back';
        backDiv.textContent = '?';
        
        innerDiv.appendChild(frontDiv);
        innerDiv.appendChild(backDiv);
        cardDiv.appendChild(innerDiv);
        
        const cardObject = {
          emoji: cardData.emoji,
          matched: false,
          flipped: false,
          element: cardDiv,
          index: index
        };
        
        cardDiv.addEventListener('click', handleCardClick(cardObject));
        gridEl.appendChild(cardDiv);
        cards.push(cardObject);
      });
    }
    
    function resetGame() {
      moves = 0;
      matchedPairs = 0;
      lockBoard = false;
      firstCard = null;
      secondCard = null;
      buildGrid();
      updateStats();
      setMessage('🃏 Find pairs!', true);
    }
    
    newGameBtn.addEventListener('click', resetGame);
    
    function initialize() {
      buildGrid();
      moves = 0;
      matchedPairs = 0;
      lockBoard = false;
      firstCard = null;
      secondCard = null;
      updateStats();
      setMessage('🐾 Flip to match!', true);
    }
    
    initialize();
  })();
</script>
</body>
</html>
