<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twik the AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0a0a0a; overscroll-behavior: none; touch-action: none; -webkit-user-select: none; user-select: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { from { transform: translate(-50%, -20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-slide-down { animation: slideDown 0.4s ease-out forwards; }
    </style>
</head>
<body class="text-neutral-100 font-sans antialiased">
    <!-- START SCREEN -->
    <div id="screen-start" class="min-h-screen flex flex-col items-center justify-center p-6">
        <h1 class="text-6xl md:text-8xl font-black tracking-tighter mb-12 bg-gradient-to-r from-neutral-100 to-neutral-500 bg-clip-text text-transparent">TWIK</h1>
        <button onclick="startGame()" class="bg-white text-neutral-950 px-10 py-4 rounded-full font-bold text-lg md:text-xl flex items-center gap-3 hover:scale-105 transition-transform active:scale-95">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            Start Game
        </button>
    </div>

    <!-- PLAYING SCREEN -->
    <div id="screen-play" class="hidden relative w-full h-screen bg-white overflow-hidden text-neutral-900">
        <canvas id="game-canvas" class="absolute inset-0 cursor-crosshair touch-none"></canvas>
        <div id="hud" class="hidden">
            <div id="hud-category" class="absolute top-4 left-4 z-10 bg-white/70 backdrop-blur text-neutral-600 font-semibold text-xs uppercase tracking-wider px-3 py-1.5 rounded-full shadow-sm border border-neutral-200 pointer-events-none">Category</div>
            <div id="hud-chances" class="absolute top-4 right-4 z-10 bg-white/70 backdrop-blur text-neutral-600 font-semibold text-xs uppercase tracking-wider px-3 py-1.5 rounded-full shadow-sm border border-neutral-200 pointer-events-none">Chances: 5</div>
        </div>
        <div id="overlay-dim" class="hidden absolute inset-0 bg-white/50 backdrop-blur-sm z-20 pointer-events-none transition-all duration-500"></div>
        <div id="toast-category" class="hidden absolute top-20 left-1/2 -translate-x-1/2 z-30 animate-slide-down">
            <div class="bg-neutral-900 text-white px-6 py-3 rounded-full shadow-2xl text-sm font-medium whitespace-nowrap">Your category is <span id="toast-category-text" class="font-bold text-emerald-400"></span></div>
        </div>
        <div id="toast-analyzing" class="hidden absolute top-20 left-1/2 -translate-x-1/2 z-30 animate-fade-in">
            <div class="bg-neutral-900 text-white px-6 py-3 rounded-full shadow-2xl text-sm font-medium flex items-center gap-3">
                <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-white"></span></span>
                Analyzing drawing...
            </div>
        </div>
        <div id="modal-question" class="hidden absolute top-24 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-40 animate-slide-down">
            <div class="bg-white border border-neutral-200 shadow-2xl rounded-3xl p-6 text-center flex flex-col gap-6">
                <p class="text-neutral-500 text-xs font-bold uppercase tracking-widest">Question</p>
                <p id="question-text" class="text-xl font-medium text-neutral-900">"Question goes here?"</p>
                <div class="flex gap-3 w-full">
                    <button onclick="handleAnswer('Yes')" class="flex-1 bg-neutral-900 text-white py-3 rounded-xl font-bold hover:bg-neutral-800 active:scale-95 transition-all">Yes</button>
                    <button onclick="handleAnswer('No')" class="flex-1 bg-neutral-100 text-neutral-900 py-3 rounded-xl font-bold hover:bg-neutral-200 active:scale-95 transition-all">No</button>
                </div>
            </div>
        </div>
        <div id="modal-guess" class="hidden absolute top-24 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-40 animate-slide-down">
            <div class="bg-neutral-900 shadow-2xl rounded-3xl p-6 text-center flex flex-col gap-6 border border-neutral-800 text-white">
                <p class="text-neutral-400 text-xs font-bold uppercase tracking-widest">My Guess</p>
                <p id="guess-text" class="text-2xl font-medium">Is it a guess?</p>
                <div class="flex gap-3 w-full">
                    <button onclick="handleGuessResult(true)" class="flex-1 bg-emerald-500 text-white py-3 rounded-xl font-bold hover:bg-emerald-600 active:scale-95 transition-all">Yes</button>
                    <button onclick="handleGuessResult(false)" class="flex-1 bg-rose-500 text-white py-3 rounded-xl font-bold hover:bg-rose-600 active:scale-95 transition-all">No</button>
                </div>
            </div>
        </div>
        <div id="toolbar" class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[98%] sm:w-[95%] max-w-lg z-10 transition-opacity duration-300">
            <div class="bg-white/90 backdrop-blur-md shadow-2xl border border-neutral-200 rounded-full p-1.5 sm:p-2 flex items-center justify-between">
                <div class="flex items-center gap-1 sm:gap-2 pl-1 sm:pl-2">
                    <button id="btn-pen" onclick="setTool('pen')" class="p-1.5 sm:p-2 rounded-full transition-colors flex-shrink-0 bg-neutral-900 text-white"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sm:w-[18px] sm:h-[18px]"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg></button>
                    <button id="btn-eraser" onclick="setTool('eraser')" class="p-1.5 sm:p-2 rounded-full transition-colors flex-shrink-0 text-neutral-400 hover:text-neutral-900 hover:bg-neutral-100"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sm:w-[18px] sm:h-[18px]"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"></path><path d="M22 21H7"></path><path d="m5 11 9 9"></path></svg></button>
                    <div class="w-[1px] h-5 sm:h-6 bg-neutral-200 mx-0.5 sm:mx-1 flex-shrink-0"></div>
                    <div id="color-picker" class="flex gap-1 sm:gap-1.5 transition-opacity">
                        <button onclick="setColor('#000000', this)" class="color-btn w-5 h-5 sm:w-6 sm:h-6 rounded-full border-2 transition-transform flex-shrink-0 scale-110 border-neutral-400 shadow-sm" style="background-color: #000000"></button>
                        <button onclick="setColor('#EF4444', this)" class="color-btn w-5 h-5 sm:w-6 sm:h-6 rounded-full border-2 transition-transform flex-shrink-0 border-transparent hover:scale-110" style="background-color: #EF4444"></button>
                        <button onclick="setColor('#3B82F6', this)" class="color-btn w-5 h-5 sm:w-6 sm:h-6 rounded-full border-2 transition-transform flex-shrink-0 border-transparent hover:scale-110" style="background-color: #3B82F6"></button>
                        <button onclick="setColor('#10B981', this)" class="color-btn w-5 h-5 sm:w-6 sm:h-6 rounded-full border-2 transition-transform flex-shrink-0 border-transparent hover:scale-110" style="background-color: #10B981"></button>
                    </div>
                    <div class="w-[1px] h-5 sm:h-6 bg-neutral-200 mx-0.5 sm:mx-1 flex-shrink-0"></div>
                    <input id="slider-thickness" type="range" min="2" max="12" value="4" oninput="setThickness(this.value)" class="w-12 sm:w-16 h-1.5 bg-neutral-200 rounded-lg appearance-none cursor-pointer accent-neutral-900 flex-shrink-0" />
                </div>
                <button id="btn-submit" onclick="handleSubmit()" disabled class="flex items-center justify-center gap-1.5 sm:gap-2 px-3 py-1.5 sm:px-5 sm:py-2.5 rounded-full font-bold text-sm sm:text-base transition-all flex-shrink-0 ml-1 bg-neutral-200 text-neutral-400 cursor-not-allowed">
                    <span class="hidden min-[400px]:inline">Submit</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sm:w-[16px] sm:h-[16px]"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- WIN SCREEN -->
    <div id="screen-win" class="hidden min-h-screen flex-col items-center justify-center p-6 text-center animate-fade-in">
        <h1 class="text-4xl md:text-6xl font-black text-emerald-400 mb-4">Congratulations!</h1>
        <p class="text-lg md:text-xl text-neutral-400 mb-12">You stumped the AI in 5 rounds.</p>
        <button onclick="resetGame()" class="bg-white text-neutral-950 px-10 py-4 rounded-full font-bold text-lg hover:scale-105 transition-transform">Play Again</button>
    </div>

    <!-- LOSE SCREEN -->
    <div id="screen-lose" class="hidden min-h-screen flex-col items-center justify-center p-6 text-center animate-fade-in">
        <h1 class="text-4xl md:text-6xl font-black text-rose-500 mb-4">Game Over</h1>
        <p class="text-lg md:text-xl text-neutral-400 mb-12">The AI guessed your drawing!</p>
        <button onclick="resetGame()" class="bg-white text-neutral-950 px-10 py-4 rounded-full font-bold text-lg hover:scale-105 transition-transform">Try Again</button>
    </div>

    <script>
        // ==========================================
        // REQUIRED CONFIGURATION
        // ==========================================
        
        // 🚨 REPLACE THIS WITH YOUR REAL VERCEL WEBSITE URL! 🚨
        // Keep the quotes. Example: "https://my-cool-website.vercel.app"
        // Do NOT include a slash (/) at the end.
        const YOUR_VERCEL_URL = "https://vercel.com/shaileshsingh007s-projects/code-canvas";

        // ==========================================

        const CATEGORIES = ['Sports', 'Animals', 'Food', 'Vehicles', 'Electronics', 'Furniture', 'Clothing'];
        
        let state = {
            category: '', attempt: 1, history: [], currentQuestion: '', currentGuess: '', userAnswer: '',
            hasDrawn: false, activeTool: 'pen', color: '#000000', thickness: 4, isDrawing: false, overlayActive: false
        };

        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const screens = { start: document.getElementById('screen-start'), play: document.getElementById('screen-play'), win: document.getElementById('screen-win'), lose: document.getElementById('screen-lose') };
        const overlays = { dim: document.getElementById('overlay-dim'), toastCategory: document.getElementById('toast-category'), toastAnalyzing: document.getElementById('toast-analyzing'), modalQuestion: document.getElementById('modal-question'), modalGuess: document.getElementById('modal-guess') };
        const ui = { hud: document.getElementById('hud'), hudCategory: document.getElementById('hud-category'), hudChances: document.getElementById('hud-chances'), toastCatText: document.getElementById('toast-category-text'), questionText: document.getElementById('question-text'), guessText: document.getElementById('guess-text'), toolbar: document.getElementById('toolbar'), btnPen: document.getElementById('btn-pen'), btnEraser: document.getElementById('btn-eraser'), colorPicker: document.getElementById('color-picker'), btnSubmit: document.getElementById('btn-submit') };

        function resizeCanvas() {
            if(screens.play.classList.contains('hidden')) return;
            const currentData = ctx.getImageData(0, 0, canvas.width || 1, canvas.height || 1);
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (canvas.width > 1) ctx.putImageData(currentData, 0, 0);
        }
        window.addEventListener('resize', resizeCanvas);

        function getCoordinates(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX, y: clientY };
        }

        function handleDrawStart(e) {
            if (state.overlayActive) return;
            const { x, y } = getCoordinates(e);
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = state.activeTool === 'eraser' ? '#FFFFFF' : state.color;
            ctx.lineWidth = state.activeTool === 'eraser' ? state.thickness * 3 : state.thickness;
            state.isDrawing = true;
            if (!state.hasDrawn) {
                state.hasDrawn = true;
                updateSubmitButton();
            }
        }

        function handleDrawMove(e) {
            if (!state.isDrawing || state.overlayActive) return;
            if (e.cancelable) e.preventDefault(); 
            const { x, y } = getCoordinates(e);
            ctx.lineTo(x, y);
            ctx.stroke();
        }

        function handleDrawEnd() { state.isDrawing = false; }

        canvas.addEventListener('mousedown', handleDrawStart);
        canvas.addEventListener('mousemove', handleDrawMove);
        window.addEventListener('mouseup', handleDrawEnd);
        canvas.addEventListener('mouseout', handleDrawEnd);
        canvas.addEventListener('touchstart', handleDrawStart, { passive: false });
        canvas.addEventListener('touchmove', handleDrawMove, { passive: false });
        window.addEventListener('touchend', handleDrawEnd);

        function switchScreen(screenName) {
            Object.values(screens).forEach(s => { s.classList.add('hidden'); s.classList.remove('flex'); });
            screens[screenName].classList.remove('hidden');
            if(screenName !== 'play') screens[screenName].classList.add('flex');
        }

        function showOverlay(overlayName) {
            Object.values(overlays).forEach(o => o.classList.add('hidden'));
            state.overlayActive = false;
            ui.toolbar.classList.remove('opacity-0', 'pointer-events-none');
            if (overlayName) {
                state.overlayActive = true;
                overlays[overlayName].classList.remove('hidden');
                if (overlayName === 'modalQuestion' || overlayName === 'modalGuess') overlays.dim.classList.remove('hidden');
                if (overlayName !== 'toastCategory') ui.toolbar.classList.add('opacity-0', 'pointer-events-none');
            }
        }

        function updateHUD() {
            ui.hudCategory.innerText = state.category;
            ui.hudChances.innerText = `Chances: ${6 - state.attempt}`;
        }

        function updateSubmitButton() {
            if (state.hasDrawn) {
                ui.btnSubmit.disabled = false;
                ui.btnSubmit.className = "flex items-center justify-center gap-1.5 sm:gap-2 px-3 py-1.5 sm:px-5 sm:py-2.5 rounded-full font-bold text-sm sm:text-base transition-all flex-shrink-0 ml-1 bg-neutral-900 text-white hover:bg-neutral-800 active:scale-95";
            } else {
                ui.btnSubmit.disabled = true;
                ui.btnSubmit.className = "flex items-center justify-center gap-1.5 sm:gap-2 px-3 py-1.5 sm:px-5 sm:py-2.5 rounded-full font-bold text-sm sm:text-base transition-all flex-shrink-0 ml-1 bg-neutral-200 text-neutral-400 cursor-not-allowed";
            }
        }

        function setTool(tool) {
            state.activeTool = tool;
            ui.btnPen.className = `p-1.5 sm:p-2 rounded-full transition-colors flex-shrink-0 ${tool === 'pen' ? 'bg-neutral-900 text-white' : 'text-neutral-400 hover:text-neutral-900 hover:bg-neutral-100'}`;
            ui.btnEraser.className = `p-1.5 sm:p-2 rounded-full transition-colors flex-shrink-0 ${tool === 'eraser' ? 'bg-neutral-900 text-white' : 'text-neutral-400 hover:text-neutral-900 hover:bg-neutral-100'}`;
            ui.colorPicker.className = `flex gap-1 sm:gap-1.5 transition-opacity ${tool === 'eraser' ? 'opacity-30 pointer-events-none' : 'opacity-100'}`;
        }

        function setColor(hex, btnElement) {
            state.color = hex; setTool('pen');
            document.querySelectorAll('.color-btn').forEach(btn => { btn.className = "color-btn w-5 h-5 sm:w-6 sm:h-6 rounded-full border-2 transition-transform flex-shrink-0 border-transparent hover:scale-110"; });
            btnElement.className = "color-btn w-5 h-5 sm:w-6 sm:h-6 rounded-full border-2 transition-transform flex-shrink-0 scale-110 border-neutral-400 shadow-sm";
        }

        function setThickness(val) { state.thickness = parseInt(val); }

        function startGame() {
            state.category = CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)];
            state.attempt = 1; state.history = []; state.hasDrawn = false;
            switchScreen('play'); resizeCanvas(); updateHUD(); updateSubmitButton();
            ui.hud.classList.add('hidden'); 
            ui.toastCatText.innerText = state.category;
            showOverlay('toastCategory');
            setTimeout(() => { showOverlay(null); ui.hud.classList.remove('hidden'); }, 3000);
        }

        function resetGame() { switchScreen('start'); showOverlay(null); }

        function getCompressedImage() {
            const MAX_SIZE = 400;
            let width = canvas.width, height = canvas.height;
            if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
            else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = width; tempCanvas.height = height;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.fillStyle = '#FFFFFF'; tCtx.fillRect(0, 0, width, height); tCtx.drawImage(canvas, 0, 0, width, height);
            return tempCanvas.toDataURL('image/jpeg', 0.5).split(',')[1];
        }

        async function fetchGemini(prompt, base64Image) {
            // Remove trailing slashes if user added one by accident
            const safeDomain = YOUR_VERCEL_URL.replace(/\/$/, "");
            
            // Hardcoded absolute endpoints
            const endpoints = [`${safeDomain}/api/Gemini`, `${safeDomain}/api/gemini`];
            const payload = { action: 'vision', prompt: prompt, image: base64Image };

            for (let url of endpoints) {
                for (let i = 0; i < 2; i++) {
                    try {
                        const response = await fetch(url, { 
                            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) 
                        });
                        
                        if (response.status === 404) break; 
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        
                        const data = await response.json();
                        let rawText = data.candidates[0].content.parts[0].text;
                        rawText = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
                        return JSON.parse(rawText);

                    } catch (error) {
                        if (i === 1 && url === endpoints[1]) throw new Error("Could not find the API at " + endpoints[0] + " or " + endpoints[1]);
                        await new Promise(res => setTimeout(res, 1000));
                    }
                }
            }
        }

        async function handleSubmit() {
            if (!state.hasDrawn) return;
            
            if (YOUR_VERCEL_URL.includes("YOUR-WEBSITE")) {
                alert("CONFIGURATION ERROR:\nYou must open twik.html and edit the 'YOUR_VERCEL_URL' variable at the top of the script code with your real Vercel URL.");
                return;
            }
            
            showOverlay('toastAnalyzing');
            const base64Image = getCompressedImage();
            const historyText = state.history.length > 0 ? state.history.map(h => `Attempt ${h.attempt}: I asked "${h.question}", User said "${h.answer}". I guessed "${h.guess}" (Wrong).`).join('\n') : "No previous history.";

            const prompt = `You are playing a drawing guessing game.\nCategory: "${state.category}". Attempt: ${state.attempt}/5.\nHistory: ${historyText}\nTask: Analyze the drawing. Ask ONE Yes/No question to help you narrow down what the drawing is. DO NOT make a guess yet.\nReturn ONLY a JSON object: { "question": "your yes/no question here" }`;

            try {
                const res = await fetchGemini(prompt, base64Image);
                state.currentQuestion = res.question;
                ui.questionText.innerText = `"${state.currentQuestion}"`;
                showOverlay('modalQuestion');
            } catch (err) {
                alert(err.message);
                showOverlay(null);
            }
        }

        async function handleAnswer(answer) {
            state.userAnswer = answer;
            showOverlay('toastAnalyzing');
            const base64Image = getCompressedImage();
            const historyText = state.history.length > 0 ? state.history.map(h => `Attempt ${h.attempt}: I asked "${h.question}", User said "${h.answer}". I guessed "${h.guess}" (Wrong).`).join('\n') : "No previous history.";

            const prompt = `You are playing a drawing guessing game.\nCategory: "${state.category}".\nHistory: ${historyText}\nCRITICAL CURRENT STATE: You just asked "${state.currentQuestion}" and the user answered "${state.userAnswer}".\nTask: Make your final specific guess of what the drawing is.\nCRITICAL RULE: You MUST logically respect the user's answer. If they said 'No' to a trait, your guess MUST NOT have that trait.\nReturn ONLY a JSON object: { "guess": "your specific guess here" }`;

            try {
                const res = await fetchGemini(prompt, base64Image);
                state.currentGuess = res.guess;
                const prefix = state.currentGuess.match(/^[aeiou]/i) ? 'an' : 'a';
                ui.guessText.innerText = `Is it ${prefix} ${state.currentGuess}?`;
                showOverlay('modalGuess');
            } catch (err) {
                alert(err.message);
                showOverlay(null);
            }
        }

        function handleGuessResult(userAnsweredYesToGuess) {
            if (userAnsweredYesToGuess) { switchScreen('lose'); showOverlay(null); } 
            else {
                if (state.attempt >= 5) { switchScreen('win'); showOverlay(null); } 
                else {
                    state.history.push({ attempt: state.attempt, question: state.currentQuestion, answer: state.userAnswer, guess: state.currentGuess });
                    state.attempt++; updateHUD(); showOverlay(null);
                }
            }
        }
    </script>
</body>
</html>
