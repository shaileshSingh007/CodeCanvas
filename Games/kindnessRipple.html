<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Kindness Ripples · Complete Edition</title>
  <style>
    :root {
      --bg-main: #0b0f19;
      --bg-panel: #1e293b;
      --accent: #3b82f6;
      --text-main: #f8fafc;
      --success: #10b981;
      --danger: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

    body {
      background: var(--bg-main);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      user-select: none;
      touch-action: none;
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(11, 15, 25, 0.95);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      padding: 20px;
      transition: opacity 0.3s;
    }
    .modal-overlay.hidden { opacity: 0; pointer-events: none; }
    .modal-box {
      background: var(--bg-panel);
      padding: 2rem;
      border-radius: 1.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      border: 1px solid #334155;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-title { font-size: 1.6rem; font-weight: bold; margin-bottom: 0.5rem; color: #fbbf24; }
    .modal-subtitle { color: #94a3b8; font-size: 0.95rem; margin-bottom: 1.5rem; }
    
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border: none;
      padding: 0.9rem 2rem;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 2rem;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
      transition: transform 0.1s;
      margin-top: 1rem;
    }
    .btn-primary:active { transform: scale(0.97); }

    /* MCQ */
    .quiz-question { margin-bottom: 1.5rem; font-size: 1.05rem; line-height: 1.5; color: #e2e8f0; text-align: left;}
    .btn-option {
      background: #334155;
      color: white;
      border: 2px solid #475569;
      padding: 0.9rem 1.2rem;
      border-radius: 1rem;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.2s;
      text-align: left;
      width: 100%;
      margin-bottom: 0.8rem;
    }
    .btn-option:active { transform: scale(0.98); }
    .btn-option.correct { background: #10b981; border-color: #059669; }
    .btn-option.wrong { background: #ef4444; border-color: #b91c1c; animation: shake 0.3s; }

    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

    /* Main App Layout */
    .app {
      width: 100%;
      max-width: 800px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #334155;
      z-index: 10;
    }
    .level-indicator { font-weight: bold; font-size: 1.1rem; color: #60a5fa; }
    .score-badge { background: #0f172a; padding: 0.4rem 1rem; border-radius: 1rem; font-weight: bold; color: #fbbf24; border: 1px solid #334155; }
    .reset-btn { background: none; border: none; color: #94a3b8; font-size: 0.9rem; cursor: pointer; text-decoration: underline; }

    /* Canvas */
    .canvas-container {
      flex: 1;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    
    .dialog-bubble {
      position: absolute;
      top: 12%;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      color: #1e293b;
      padding: 1.2rem 1.5rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 1.05rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      text-align: center;
      max-width: 85%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 5;
    }
    .dialog-bubble.show { opacity: 1; }
    .dialog-bubble::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 10px 10px 0;
      border-style: solid;
      border-color: white transparent transparent transparent;
    }

    /* Tokens Bar */
    .tokens-bar {
      background: var(--bg-panel);
      padding: 1.2rem 1rem;
      border-top: 1px solid #334155;
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
      min-height: 120px;
      z-index: 10;
    }
    .tokens-bar::-webkit-scrollbar { display: none; }
    
    .token-item {
      flex: 0 0 auto;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 1rem;
      padding: 0.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 80px;
      height: 90px;
      cursor: grab;
      touch-action: none;
      transition: border-color 0.2s;
    }
    .token-item:active { cursor: grabbing; border-color: #fbbf24; }
    .token-item.locked {
      opacity: 0.6;
      filter: grayscale(0.8);
      cursor: pointer;
    }
    .token-item.locked:active { cursor: pointer; border-color: #475569; }
    .token-item.locked .token-emoji::after {
      content: '🔒';
      position: absolute;
      font-size: 1rem;
      bottom: -5px; right: -10px;
      background: #1e293b;
      border-radius: 50%;
      padding: 2px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }
    .token-emoji { font-size: 2.2rem; pointer-events: none; position: relative; }
    .token-name { font-size: 0.75rem; color: #cbd5e1; margin-top: 0.4rem; pointer-events: none; font-weight: 600; white-space: normal; text-align: center; line-height: 1.1; }

    .token-placeholder {
      flex: 0 0 auto;
      min-width: 80px;
      height: 90px;
      background: rgba(15, 23, 42, 0.5);
      border: 1px dashed #475569;
      border-radius: 1rem;
    }

    /* Notifications */
    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(30, 41, 59, 0.95);
      color: white;
      padding: 0.8rem 1.8rem;
      border-radius: 2rem;
      font-weight: bold;
      border: 1px solid #475569;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s;
      z-index: 1000;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- Modals -->
<div id="startScreen" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">Kindness Ripples</div>
    <div class="modal-subtitle">6 Levels of Compassion</div>
    <p style="color: #cbd5e1; font-size: 0.95rem; line-height: 1.6; text-align: left; margin-bottom: 1.5rem;">
      Items are locked! Tap a locked item and answer a question to unlock it.<br><br>
      Once unlocked, drag it onto the correct needy character. Once used, the item disappears!
    </p>
    <button class="btn-primary" id="startBtn">Begin Journey</button>
  </div>
</div>

<div id="levelUpScreen" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-title" id="levelUpTitle">Level Complete!</div>
    <div class="modal-subtitle" id="levelUpSubtitle"></div>
    <button class="btn-primary" id="continueBtn">Next Level</button>
  </div>
</div>

<div id="quizScreen" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-title">Unlock Item</div>
    <div class="modal-subtitle" id="quizSubtitle">Answer to unlock this item</div>
    <div id="quizQuestion" class="quiz-question"></div>
    <div id="quizOptions"></div>
    <button class="btn-secondary" id="closeQuizBtn" style="background: #475569; color: white; border: none; padding: 0.8rem 2rem; border-radius: 2rem; width: 100%; margin-top: 1rem; cursor: pointer;">Cancel</button>
  </div>
</div>

<div class="app">
  <header class="header">
    <div class="level-indicator" id="uiLevelText">Level 1: Plants</div>
    <div class="score-badge">⭐ <span id="uiPoints">0</span></div>
    <button class="reset-btn" id="resetBtn">Restart</button>
  </header>
  <main class="canvas-container" id="dropZone">
    <div id="dialogBubble" class="dialog-bubble">...</div>
    <canvas id="gameCanvas"></canvas>
  </main>
  <div class="tokens-bar" id="tokensBar"></div>
</div>

<div id="toast" class="toast"></div>

// State
let state = {
  currentLevelIdx: 0,
  points: 0,
  levelPairs: [], 
  availableItems: [],
  unlockedItems: [], // Tracks which items have been unlocked
  currentEntity: null,
};

// DOM Elements
const dropZone = document.getElementById('dropZone');
const tokensBar = document.getElementById('tokensBar');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const uiLevelText = document.getElementById('uiLevelText');
const uiPoints = document.getElementById('uiPoints');
const dialogBubble = document.getElementById('dialogBubble');
const toast = document.getElementById('toast');

const startScreen = document.getElementById('startScreen');
const levelUpScreen = document.getElementById('levelUpScreen');
const quizScreen = document.getElementById('quizScreen');

// Drag Variables
let draggedElement = null;
let placeholder = null;
let dragItemData = null;
let startX = 0, startY = 0;

// Setup & Canvas
let particles = [];
function resizeCanvas() {
  const rect = dropZone.getBoundingClientRect();
  ctx.setTransform(1, 0, 0, 1, 0, 0); 
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
}
window.addEventListener('resize', resizeCanvas);

function spawnParticles(x, y) {
  for(let i=0; i<30; i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * 10,
      vy: (Math.random() - 0.5) * 10,
      life: 1.0,
      color: ['#fbbf24', '#34d399', '#60a5fa', '#f472b6'][Math.floor(Math.random()*4)]
    });
  }
}

let isHappyState = false;
function renderLoop() {
  const w = canvas.width / window.devicePixelRatio;
  const h = canvas.height / window.devicePixelRatio;
  
  ctx.clearRect(0, 0, w, h);
  
  if (state.currentEntity) {
    const cx = w / 2;
    const cy = h / 2 + 10;
    
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    if (isHappyState) {
      ctx.shadowColor = '#fbbf24';
      ctx.shadowBlur = 40;
    }
    
    // Draw Emoji
    ctx.font = '85px "Apple Color Emoji", "Segoe UI Emoji", sans-serif';
    const displayEmoji = isHappyState ? state.currentEntity.he : state.currentEntity.e;
    const bounce = isHappyState ? Math.sin(Date.now() / 150) * 15 : Math.sin(Date.now() / 400) * 5;
    ctx.fillText(displayEmoji, cx, cy + bounce);
    ctx.restore();
    
    // Draw Entity Name to avoid confusion!
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 20px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#cbd5e1';
    ctx.fillText(state.currentEntity.en, cx, cy + 70 + (isHappyState ? 0 : bounce));
    ctx.restore();
  }

  // Draw Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx; p.y += p.vy; p.life -= 0.02;
    if (p.life <= 0) particles.splice(i, 1);
    else {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1.0;
  requestAnimationFrame(renderLoop);
}

// Logic 
function startLevel() {
  if (state.currentLevelIdx >= GAME_DATA.length) {
    alert(`Game Complete! You scored ${state.points} points. You are a true Kindness Ripple!`);
    state.currentLevelIdx = 0; state.points = 0;
  }
  
  const levelData = GAME_DATA[state.currentLevelIdx];
  uiLevelText.textContent = `Level ${state.currentLevelIdx + 1}: ${levelData.levelName}`;
  
  // Reset locks for the new level
  state.unlockedItems = [];
  state.levelPairs = [...levelData.pairs].sort(() => Math.random() - 0.5);
  state.availableItems = [...state.levelPairs].sort(() => Math.random() - 0.5);
  
  renderTokens();
  loadNextEntity();
}

function renderTokens() {
  tokensBar.innerHTML = '';
  state.availableItems.forEach(item => {
    const isUnlocked = state.unlockedItems.includes(item.id);
    const div = document.createElement('div');
    div.className = `token-item ${isUnlocked ? '' : 'locked'}`;
    div.innerHTML = `<div class="token-emoji">${item.ie}</div><div class="token-name">${item.in}</div>`;
    
    if (isUnlocked) {
        // Unlocked items can be dragged
        div.addEventListener('pointerdown', (e) => startDrag(e, div, item));
    } else {
        // Locked items open the quiz
        div.addEventListener('click', () => openQuiz(item));
    }
    
    tokensBar.appendChild(div);
  });
}

function loadNextEntity() {
  if (state.levelPairs.length === 0) {
    document.getElementById('levelUpTitle').textContent = `Level ${state.currentLevelIdx + 1} Complete!`;
    document.getElementById('levelUpSubtitle').textContent = `You helped 10 entities in ${GAME_DATA[state.currentLevelIdx].levelName}.`;
    levelUpScreen.classList.remove('hidden');
    return;
  }
  
  isHappyState = false;
  state.currentEntity = state.levelPairs.pop();
  
  dialogBubble.textContent = state.currentEntity.clue;
  dialogBubble.classList.add('show');
}

// Quiz System (Unlock Phase)
function openQuiz(item) {
  document.getElementById('quizSubtitle').innerHTML = `Unlock <b>${item.in}</b>`;
  document.getElementById('quizQuestion').textContent = item.q;
  
  const optsContainer = document.getElementById('quizOptions');
  optsContainer.innerHTML = '';
  
  // Create an array mapping text to whether it was originally the correct answer (item.a is always 0)
  let optionsArray = item.opts.map((optText, index) => {
    return { text: optText, isCorrect: index === item.a };
  });
  
  // Shuffle the options array!
  optionsArray.sort(() => Math.random() - 0.5);
  
  // Render the shuffled options
  optionsArray.forEach((optObj) => {
    const btn = document.createElement('button');
    btn.className = 'btn-option';
    btn.textContent = optObj.text;
    btn.onclick = () => handleQuizAnswer(btn, optObj.isCorrect, item);
    optsContainer.appendChild(btn);
  });
  
  quizScreen.classList.remove('hidden');
}

function handleQuizAnswer(btn, isCorrect, item) {
  const allBtns = document.querySelectorAll('#quizOptions .btn-option');
  allBtns.forEach(b => b.style.pointerEvents = 'none');

  if (isCorrect) {
    btn.classList.add('correct');
    setTimeout(() => {
      quizScreen.classList.add('hidden');
      state.unlockedItems.push(item.id);
      showToast(`${item.in} Unlocked! 🔓`);
      renderTokens(); // Re-render to make draggable
    }, 800);
  } else {
    btn.classList.add('wrong');
    setTimeout(() => {
      quizScreen.classList.add('hidden');
      showToast("Incorrect answer. Try again!", true);
    }, 1000);
  }
}

document.getElementById('closeQuizBtn').addEventListener('click', () => {
    quizScreen.classList.add('hidden');
});

// Drag & Drop Implementation (Physical Element Move)
function startDrag(e, element, itemData) {
  if (e.pointerType === 'touch') e.target.releasePointerCapture(e.pointerId);

  draggedElement = element;
  dragItemData = itemData;
  
  const rect = element.getBoundingClientRect();
  startX = e.clientX - rect.left - rect.width/2;
  startY = e.clientY - rect.top - rect.height/2;

  placeholder = document.createElement('div');
  placeholder.className = 'token-placeholder';
  element.parentNode.insertBefore(placeholder, element);

  element.style.position = 'fixed';
  element.style.zIndex = '9999';
  element.style.width = rect.width + 'px';
  element.style.height = rect.height + 'px';
  document.body.appendChild(element);
  
  moveDrag(e);

  document.addEventListener('pointermove', moveDrag, {passive: false});
  document.addEventListener('pointerup', endDrag);
}

function moveDrag(e) {
  if (!draggedElement) return;
  e.preventDefault(); 
  draggedElement.style.left = (e.clientX - startX - draggedElement.offsetWidth/2) + 'px';
  draggedElement.style.top = (e.clientY - startY - draggedElement.offsetHeight/2) + 'px';
}

function endDrag(e) {
  document.removeEventListener('pointermove', moveDrag);
  document.removeEventListener('pointerup', endDrag);
  
  if (!draggedElement) return;

  const dropRect = dropZone.getBoundingClientRect();
  if (e.clientX >= dropRect.left && e.clientX <= dropRect.right &&
      e.clientY >= dropRect.top && e.clientY <= dropRect.bottom) {
      handleDropAttempt(dragItemData);
  } else {
      revertDrag();
  }
}

function handleDropAttempt(item) {
  if (item.id === state.currentEntity.id) {
    // Correct Match!
    draggedElement.style.display = 'none'; 
    processSuccess(item);
  } else {
    // Wrong Item
    showToast("This isn't what they need...", true);
    dialogBubble.style.transform = 'translateX(-50%) translateX(10px)';
    setTimeout(() => dialogBubble.style.transform = 'translateX(-50%) translateX(-10px)', 100);
    setTimeout(() => dialogBubble.style.transform = 'translateX(-50%)', 200);
    revertDrag();
  }
}

function revertDrag() {
  if (!draggedElement || !placeholder) return;
  draggedElement.style.position = '';
  draggedElement.style.zIndex = '';
  draggedElement.style.left = '';
  draggedElement.style.top = '';
  draggedElement.style.width = '';
  draggedElement.style.height = '';
  placeholder.parentNode.insertBefore(draggedElement, placeholder);
  placeholder.remove();
  
  draggedElement = null;
  placeholder = null;
  dragItemData = null;
}

function processSuccess(item) {
  if(draggedElement) draggedElement.remove();
  if(placeholder) placeholder.remove();
  draggedElement = null;
  placeholder = null;
  
  state.availableItems = state.availableItems.filter(i => i.id !== item.id);
  
  state.points += 50;
  uiPoints.textContent = state.points;
  
  isHappyState = true;
  dialogBubble.textContent = "Thank you! I feel so much better! ✨";
  
  const w = canvas.width / window.devicePixelRatio;
  const h = canvas.height / window.devicePixelRatio;
  spawnParticles(w/2, h/2);
  
  setTimeout(() => {
    dialogBubble.classList.remove('show');
    setTimeout(loadNextEntity, 300);
  }, 2500);
}

function showToast(msg, isError = false) {
  toast.textContent = msg;
  toast.style.borderColor = isError ? 'var(--danger)' : 'var(--success)';
  toast.classList.add('show');
  clearTimeout(toast.timer);
  toast.timer = setTimeout(() => toast.classList.remove('show'), 2000);
}

// Events
document.getElementById('startBtn').addEventListener('click', () => {
  startScreen.classList.add('hidden');
  resizeCanvas();
  startLevel();
});

document.getElementById('continueBtn').addEventListener('click', () => {
  levelUpScreen.classList.add('hidden');
  state.currentLevelIdx++;
  startLevel();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if(confirm("Restart the entire game?")) {
    state.currentLevelIdx = 0;
    state.points = 0;
    uiPoints.textContent = 0;
    startLevel();
  }
});
document.addEventListener('dragstart', e => e.preventDefault());

// Init
resizeCanvas();
renderLoop();
</script>
