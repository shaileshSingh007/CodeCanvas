<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Gravity Forge · Arcade Physics</title>
  <style>
    :root {
      --bg-dark: #07090f;
      --panel-bg: #111827;
      --panel-border: #1e293b;
      --accent-cyan: #22d3ee;
      --accent-blue: #3b82f6;
      --accent-gold: #fbbf24;
      --accent-red: #ef4444;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 50% 0%, #1e293b 0%, var(--bg-dark) 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      touch-action: manipulation;
      padding: 12px;
      color: var(--text-main);
      overflow: hidden;
    }

    .game-wrapper {
      background: rgba(17, 24, 39, 0.7);
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      padding: 16px;
      width: 100%;
      max-width: 600px;
      backdrop-filter: blur(12px);
      position: relative;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 0 8px;
    }

    .hud-stats {
      display: flex;
      gap: 12px;
    }

    .stat-badge {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
    }

    .stat-badge i { font-style: normal; }
    .stat-badge .val { color: var(--accent-cyan); font-weight: 700; font-size: 1.1rem; }
    .stat-badge .val.gold { color: var(--accent-gold); }

    .ink-container {
      flex-grow: 1;
      margin: 0 20px;
      background: rgba(0, 0, 0, 0.4);
      height: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      overflow: hidden;
      position: relative;
    }

    .ink-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
      width: 100%;
      transition: width 0.1s linear, background-color 0.3s;
      box-shadow: 0 0 10px var(--accent-cyan);
    }

    .btn-reset {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-reset:hover, .btn-reset:active {
      background: rgba(239, 68, 68, 0.25);
      transform: scale(0.96);
    }

    .canvas-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 20px;
      overflow: hidden;
      background: #050811;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
      cursor: crosshair;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      border-radius: 20px;
      z-index: 10;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay h2 {
      margin: 0 0 16px 0;
      font-size: 2.5rem;
      text-shadow: 0 4px 12px rgba(0,0,0,0.5);
    }

    .overlay.win h2 { color: var(--accent-gold); }
    .overlay.lose h2 { color: var(--accent-red); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
      border: none;
      color: white;
      padding: 12px 28px;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(34, 211, 238, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:active {
      transform: translateY(2px) scale(0.98);
      box-shadow: 0 2px 8px rgba(34, 211, 238, 0.4);
    }

    .instructions {
      text-align: center;
      margin-top: 16px;
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .instructions span {
      background: rgba(255,255,255,0.05);
      padding: 3px 8px;
      border-radius: 6px;
      color: var(--text-main);
    }

    @media (max-width: 480px) {
      .game-wrapper { padding: 12px; border-radius: 24px; }
      .hud { flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
      .ink-container { order: 3; margin: 0; width: 100%; flex-basis: 100%; }
    }
  </style>
</head>
<body>

<div class="game-wrapper">
  <div class="hud">
    <div class="hud-stats">
      <div class="stat-badge"><i>🌟</i> <span class="val gold" id="levelDisplay">1</span></div>
    </div>
    
    <div class="ink-container">
      <div class="ink-bar" id="inkBar"></div>
    </div>

    <button class="btn-reset" id="resetBtn"><i>⟳</i> Reset</button>
  </div>

  <div class="canvas-container">
    <canvas id="gameCanvas"></canvas>
    
    <!-- Status Overlays -->
    <div class="overlay win" id="winOverlay">
      <h2>Sector Cleared!</h2>
      <button class="btn-primary" id="nextBtn">Next Level ➔</button>
    </div>
    
    <div class="overlay lose" id="loseOverlay">
      <h2>Signal Lost</h2>
      <button class="btn-primary" id="retryBtn">Try Again ⟳</button>
    </div>
  </div>

  <div class="instructions">
    <span>✏️ Draw</span> paths to guide the orb · Avoid <span>🔴 anomalies</span>
  </div>
</div>

<script>
  (function(){
    // --- Setup & Constants ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = 800, H = 800; // Internal fixed logical resolution
    
    // UI Elements
    const levelDisplay = document.getElementById('levelDisplay');
    const inkBar = document.getElementById('inkBar');
    const winOverlay = document.getElementById('winOverlay');
    const loseOverlay = document.getElementById('loseOverlay');
    
    // Physics & Tuning
    const GRAVITY = 0.18;
    const MAX_SPEED = 14;
    const INFLUENCE_RADIUS = 50; 
    const PULL_STRENGTH = 0.8;
    const FLOW_STRENGTH = 0.5;
    const DAMPING = 0.99;        // Air resistance
    const MAG_DAMPING = 0.85;    // Heavy drag when inside path slipstream
    
    const MAX_INK = 1000;
    const INK_COST = 1.0;        // Ink cost per pixel drawn

    // --- State ---
    let level = 1;
    let ink = MAX_INK;
    let state = 'PLAYING'; // PLAYING, WIN, LOSE

    let player = { x: 0, y: 0, vx: 0, vy: 0, radius: 10 };
    let target = { x: 0, y: 0, radius: 24, pulse: 0 };
    let obstacles = [];
    let pathLines = []; // Array of { points: [{x,y}...], length }
    let particles = []; // Visual FX
    let trails = [];    // Player trail history

    let isDrawing = false;
    let currentPath = null;
    let lastDrawPt = null;

    // --- Deterministic Random (for repeatable levels) ---
    function splitmix32(a) {
      return function() {
        a |= 0; a = a + 0x9e3779b9 | 0;
        var t = a ^ a >>> 16; t = Math.imul(t, 0x21f0aaad);
        t = t ^ t >>> 15; t = Math.imul(t, 0x735a2d97);
        return ((t = t ^ t >>> 15) >>> 0) / 4294967296;
      }
    }
    let seededRandom = Math.random;

    // --- Resize handler ---
    function resize() {
      // Scale for High DPI displays
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(canvas.width / W, canvas.height / H);
    }
    window.addEventListener('resize', resize);
    
    // --- Math Helpers ---
    function distSq(p1, p2) { return (p1.x - p2.x)**2 + (p1.y - p2.y)**2; }
    
    // Distance from point to line segment
    function getClosestPointOnSegment(p, a, b) {
      const ab = { x: b.x - a.x, y: b.y - a.y };
      const ap = { x: p.x - a.x, y: p.y - a.y };
      const lenSq = ab.x**2 + ab.y**2;
      
      let t = 0;
      if (lenSq > 0) t = (ap.x * ab.x + ap.y * ab.y) / lenSq;
      t = Math.max(0, Math.min(1, t));
      
      return {
        x: a.x + t * ab.x,
        y: a.y + t * ab.y,
        dir: ab,
        len: Math.sqrt(lenSq)
      };
    }

    // --- Core Gameplay Systems ---
    
    function generateLevel() {
      // Reset seed based on level so retries are identical
      seededRandom = splitmix32(level * 999);
      
      // Reset variables
      state = 'PLAYING';
      winOverlay.classList.remove('active');
      loseOverlay.classList.remove('active');
      pathLines = [];
      particles = [];
      trails = [];
      ink = MAX_INK;
      updateInkUI();
      levelDisplay.innerText = level;

      // Position logic based on level
      const isEven = level % 2 === 0;
      
      player.x = isEven ? W - 100 : 100;
      player.y = 100;
      player.vx = 0;
      player.vy = 0;

      target.x = isEven ? 100 : W - 100;
      target.y = H - 120;
      target.radius = 24;

      // Generate Obstacles
      obstacles = [];
      const numObstacles = Math.min(10, Math.floor(level * 1.5));
      for (let i = 0; i < numObstacles; i++) {
        // Keep away from start and end
        let ox, oy;
        let valid = false;
        while (!valid) {
          ox = 100 + seededRandom() * (W - 200);
          oy = 200 + seededRandom() * (H - 300);
          
          let dStart = Math.hypot(ox - player.x, oy - player.y);
          let dEnd = Math.hypot(ox - target.x, oy - target.y);
          
          if (dStart > 150 && dEnd > 150) valid = true;
        }
        
        obstacles.push({
          x: ox,
          y: oy,
          radius: 15 + seededRandom() * 20,
          phase: seededRandom() * Math.PI * 2
        });
      }
    }

    function createExplosion(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 6;
        particles.push({
          x: x, y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1.0,
          decay: 0.02 + Math.random() * 0.03,
          color: color,
          size: 2 + Math.random() * 4
        });
      }
    }

    function updatePhysics() {
      if (state !== 'PLAYING') return;

      // Standard Gravity
      let currentGravity = GRAVITY;
      
      // Magnetic Slipstream Evaluation
      let inSlipstream = false;
      let totalPull = {x: 0, y: 0};
      let totalFlow = {x: 0, y: 0};
      
      for (let path of pathLines) {
        for (let i = 0; i < path.points.length - 1; i++) {
          let p1 = path.points[i];
          let p2 = path.points[i+1];
          
          let closest = getClosestPointOnSegment(player, p1, p2);
          let dist = Math.hypot(player.x - closest.x, player.y - closest.y);
          
          if (dist < INFLUENCE_RADIUS) {
            inSlipstream = true;
            // Force strength scales up as you get closer to the center of the line
            let strength = 1 - (dist / INFLUENCE_RADIUS); 
            
            // 1. Pull towards the line center
            if (dist > 1) { // Avoid normalization division by zero
              let pullX = (closest.x - player.x) / dist;
              let pullY = (closest.y - player.y) / dist;
              totalPull.x += pullX * strength * PULL_STRENGTH;
              totalPull.y += pullY * strength * PULL_STRENGTH;
            }
            
            // 2. Flow along the line direction
            if (closest.len > 0) {
              let flowX = closest.dir.x / closest.len;
              let flowY = closest.dir.y / closest.len;
              totalFlow.x += flowX * strength * FLOW_STRENGTH;
              totalFlow.y += flowY * strength * FLOW_STRENGTH;
            }
          }
        }
      }

      if (inSlipstream) {
        // Apply magnetic forces
        player.vx += totalPull.x + totalFlow.x;
        player.vy += totalPull.y + totalFlow.y;
        
        // Dampen velocity to prevent orbit/slingshot (feels like gripping a rail)
        player.vx *= MAG_DAMPING;
        player.vy *= MAG_DAMPING;
        
        // Reduce standard gravity while on a line
        currentGravity *= 0.2; 
      }

      // Apply Gravity
      player.vy += currentGravity;

      // Standard Damping & Speed limit
      if (!inSlipstream) {
        player.vx *= DAMPING;
        player.vy *= DAMPING;
      }
      
      const speedSq = player.vx**2 + player.vy**2;
      if (speedSq > MAX_SPEED**2) {
        const speed = Math.sqrt(speedSq);
        player.vx = (player.vx / speed) * MAX_SPEED;
        player.vy = (player.vy / speed) * MAX_SPEED;
      }

      // Update Position
      player.x += player.vx;
      player.y += player.vy;

      // Wall Bounces
      const BOUNCE = 0.5;
      if (player.x < player.radius) { player.x = player.radius; player.vx *= -BOUNCE; }
      if (player.x > W - player.radius) { player.x = W - player.radius; player.vx *= -BOUNCE; }
      if (player.y < player.radius) { player.y = player.radius; player.vy *= -BOUNCE; }
      if (player.y > H - player.radius) { player.y = H - player.radius; player.vy *= -BOUNCE; }

      // Update Trail
      trails.push({x: player.x, y: player.y});
      if (trails.length > 15) trails.shift();

      // Check Collisions (Obstacles)
      for (let obs of obstacles) {
        if (Math.hypot(player.x - obs.x, player.y - obs.y) < player.radius + obs.radius) {
          gameOver();
          return;
        }
      }

      // Check Collisions (Target)
      if (Math.hypot(player.x - target.x, player.y - target.y) < player.radius + target.radius - 5) {
        winLevel();
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function gameOver() {
      state = 'LOSE';
      createExplosion(player.x, player.y, '#ef4444', 40);
      loseOverlay.classList.add('active');
    }

    function winLevel() {
      state = 'WIN';
      createExplosion(target.x, target.y, '#fbbf24', 50);
      createExplosion(target.x, target.y, '#22d3ee', 30);
      winOverlay.classList.add('active');
    }

    // --- Rendering ---
    
    function drawGrid() {
      ctx.strokeStyle = 'rgba(30, 41, 59, 0.4)';
      ctx.lineWidth = 2;
      const gridSize = 50;
      ctx.beginPath();
      for (let i = 0; i < W; i += gridSize) {
        ctx.moveTo(i, 0); ctx.lineTo(i, H);
        ctx.moveTo(0, i); ctx.lineTo(W, i);
      }
      ctx.stroke();
    }

    function drawPaths() {
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      
      for (let path of pathLines) {
        if (path.points.length < 2) continue;
        
        ctx.beginPath();
        ctx.moveTo(path.points[0].x, path.points[0].y);
        for (let i = 1; i < path.points.length; i++) {
          ctx.lineTo(path.points[i].x, path.points[i].y);
        }
        
        // Influence Radius Hint (Subtle background glow)
        ctx.strokeStyle = 'rgba(34, 211, 238, 0.05)';
        ctx.lineWidth = INFLUENCE_RADIUS * 2;
        ctx.stroke();

        // Core Line
        ctx.strokeStyle = '#22d3ee';
        ctx.lineWidth = 6;
        ctx.shadowColor = '#22d3ee';
        ctx.shadowBlur = 15;
        ctx.stroke();
        
        // Inner bright core
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.shadowBlur = 0;
        ctx.stroke();
      }
    }

    function drawObstacles(time) {
      for (let obs of obstacles) {
        const pulse = Math.sin(time * 0.005 + obs.phase) * 2;
        const rad = obs.radius + pulse;
        
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#ef4444';
        
        // Outer glow
        ctx.beginPath();
        ctx.arc(obs.x, obs.y, rad, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(239, 68, 68, 0.2)';
        ctx.fill();
        
        // Core
        ctx.beginPath();
        ctx.arc(obs.x, obs.y, rad * 0.7, 0, Math.PI * 2);
        ctx.fillStyle = '#7f1d1d';
        ctx.fill();
        
        // Center dot
        ctx.beginPath();
        ctx.arc(obs.x, obs.y, rad * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = '#fca5a5';
        ctx.fill();
        
        ctx.shadowBlur = 0;
      }
    }

    function drawTarget(time) {
      target.pulse = Math.sin(time * 0.003) * 3;
      
      ctx.shadowBlur = 30;
      ctx.shadowColor = '#fbbf24';
      
      // Aura
      ctx.beginPath();
      ctx.arc(target.x, target.y, target.radius + target.pulse, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(251, 191, 36, 0.2)';
      ctx.fill();
      
      // Star core
      ctx.beginPath();
      // Draw a star shape
      let rot = Math.PI / 2 * 3;
      let x = target.x, y = target.y;
      let spikes = 5;
      let outer = target.radius - 4 + target.pulse * 0.5;
      let inner = target.radius * 0.4;
      let step = Math.PI / spikes;

      ctx.moveTo(target.x, target.y - outer);
      for (let i = 0; i < spikes; i++) {
        x = target.x + Math.cos(rot) * outer;
        y = target.y + Math.sin(rot) * outer;
        ctx.lineTo(x, y);
        rot += step;
        x = target.x + Math.cos(rot) * inner;
        y = target.y + Math.sin(rot) * inner;
        ctx.lineTo(x, y);
        rot += step;
      }
      ctx.lineTo(target.x, target.y - outer);
      ctx.closePath();
      
      ctx.fillStyle = '#fbbf24';
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fill(); // mix
      ctx.shadowBlur = 0;
    }

    function drawPlayer() {
      if (state === 'LOSE') return;

      // Trail
      if (trails.length > 1) {
        ctx.beginPath();
        ctx.moveTo(trails[0].x, trails[0].y);
        for(let i=1; i<trails.length; i++) {
          ctx.lineTo(trails[i].x, trails[i].y);
        }
        ctx.strokeStyle = 'rgba(59, 130, 246, 0.5)';
        ctx.lineWidth = player.radius;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
      }

      // Orb
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#3b82f6';
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
      ctx.fillStyle = '#60a5fa';
      ctx.fill();
      
      // Core
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.arc(player.x - 2, player.y - 2, player.radius * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
    }

    function drawFX() {
      for (let p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1.0;
    }

    function render(time) {
      // Clear with dark blue gradient background
      let grad = ctx.createLinearGradient(0,0,0,H);
      grad.addColorStop(0, '#050811');
      grad.addColorStop(1, '#0f172a');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      drawGrid();
      drawPaths();
      drawObstacles(time);
      drawTarget(time);
      drawPlayer();
      drawFX();
    }

    function gameLoop(time) {
      updatePhysics();
      updateParticles();
      render(time);
      requestAnimationFrame(gameLoop);
    }

    // --- Interaction ---
    function updateInkUI() {
      let pct = Math.max(0, (ink / MAX_INK) * 100);
      inkBar.style.width = pct + '%';
      if (pct < 20) inkBar.style.background = 'var(--accent-red)';
      else inkBar.style.background = 'linear-gradient(90deg, var(--accent-blue), var(--accent-cyan))';
    }

    function getCanvasCoords(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      let clientX = e.clientX, clientY = e.clientY;
      
      if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      }
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    function handleStart(e) {
      if (state !== 'PLAYING') return;
      if (e.cancelable) e.preventDefault();
      
      isDrawing = true;
      const pos = getCanvasCoords(e);
      
      // Start a new path
      currentPath = { points: [pos] };
      pathLines.push(currentPath);
      lastDrawPt = pos;
    }

    function handleMove(e) {
      if (!isDrawing || state !== 'PLAYING' || ink <= 0) return;
      if (e.cancelable) e.preventDefault();
      
      const pos = getCanvasCoords(e);
      const dist = Math.hypot(pos.x - lastDrawPt.x, pos.y - lastDrawPt.y);
      
      // Only add point if moved enough
      if (dist > 8) {
        let cost = dist * INK_COST;
        if (ink - cost >= 0) {
          ink -= cost;
          currentPath.points.push(pos);
          lastDrawPt = pos;
          updateInkUI();
        } else {
          isDrawing = false; // Out of ink, stop line
        }
      }
    }

    function handleEnd(e) {
      isDrawing = false;
    }

    // Input Listeners
    canvas.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);

    canvas.addEventListener('touchstart', handleStart, { passive: false });
    window.addEventListener('touchmove', handleMove, { passive: false });
    window.addEventListener('touchend', handleEnd);

    // Buttons
    document.getElementById('resetBtn').addEventListener('click', generateLevel);
    document.getElementById('retryBtn').addEventListener('click', generateLevel);
    document.getElementById('nextBtn').addEventListener('click', () => {
      level++;
      generateLevel();
    });

    // Boot
    resize();
    generateLevel();
    requestAnimationFrame(gameLoop);
  })();
</script>
</body>
</html>
